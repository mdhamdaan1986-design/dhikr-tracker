  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Amiri:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    html,body { height:100%; }
    body { font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; transition:background 0.3s ease,color 0.3s ease; }
    input:focus { outline:none; }
    @keyframes fadeUp    { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn    { from{opacity:0} to{opacity:1} }
    @keyframes scaleIn   { from{opacity:0;transform:scale(0.94)} to{opacity:1;transform:scale(1)} }
    @keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes toastIn   { from{opacity:0;transform:translate(-50%,12px)} to{opacity:1;transform:translate(-50%,0)} }
    /* ── Cycle celebration ── */
    @keyframes celebOverlayIn{0%{opacity:0}12%{opacity:1}72%{opacity:1}100%{opacity:0}}
    @keyframes celebCardIn{0%{opacity:0;transform:translate(-50%,-50%) scale(0.72) translateY(20px)}22%{opacity:1;transform:translate(-50%,-50%) scale(1.03) translateY(0)}35%{transform:translate(-50%,-50%) scale(1) translateY(0)}78%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(0.95) translateY(-10px)}}
    @keyframes celebArabicIn{0%{opacity:0;transform:translateY(10px)}30%{opacity:1;transform:translateY(0)}}
    @keyframes celebRingA{0%{r:0;opacity:1}100%{r:240;opacity:0}}
    @keyframes celebRingB{0%{r:0;opacity:0.7}100%{r:320;opacity:0}}
    @keyframes celebRingC{0%{r:0;opacity:0.4}100%{r:420;opacity:0}}
    @keyframes celebGlowPulse{0%,100%{opacity:0.4}50%{opacity:0.9}}
    @keyframes celebOrb{0%{transform:scale(1);opacity:0.6}50%{transform:scale(1.15);opacity:1}100%{transform:scale(1);opacity:0.6}}
    /* Card */
    .celeb-overlay{position:fixed;inset:0;z-index:9999;pointer-events:none;animation:celebOverlayIn 2.6s ease forwards;}
    .celeb-svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible;z-index:0;}
    .celeb-card{
      position:absolute;top:50%;left:50%;
      transform:translate(-50%,-50%);
      text-align:center;pointer-events:none;
      animation:celebCardIn 2.6s cubic-bezier(0.22,1,0.36,1) forwards;
      border-radius:28px;
      padding:32px 48px 28px;
      min-width:min(300px,88vw);max-width:min(500px,90vw);
      z-index:10;
      /* Glass effect matching app style */
      background:rgba(0,0,0,0.38);
      backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      border:1.5px solid rgba(255,255,255,0.18);
      box-shadow:0 24px 80px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .celeb-arabic{font-family:'Amiri',Georgia,serif;font-size:clamp(40px,8vw,70px);font-weight:700;line-height:1.4;color:#fff;direction:rtl;display:block;margin-bottom:6px;animation:celebArabicIn 0.6s 0.1s cubic-bezier(0.22,1,0.36,1) both;}
    .celeb-divider{width:40px;height:1.5px;background:rgba(255,255,255,0.25);border-radius:2px;margin:6px auto 12px;}
    .celeb-transliteration{font-family:'Inter',sans-serif;font-size:clamp(13px,2vw,17px);font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#fff;margin-bottom:4px;}
    .celeb-translation{font-family:'Lora',Georgia,serif;font-size:clamp(11px,1.6vw,14px);font-style:italic;color:rgba(255,255,255,0.65);margin-bottom:16px;}
    .celeb-badge{display:inline-flex;align-items:center;gap:8px;padding:6px 16px;border-radius:100px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);}
    .celeb-label{font-family:'Inter',sans-serif;font-size:clamp(9px,1.4vw,11px);font-weight:800;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.7);}
    .celeb-cycles{font-family:'Inter',sans-serif;font-size:clamp(9px,1.4vw,11px);font-weight:500;color:rgba(255,255,255,0.45);}
    .scrollbar-light::-webkit-scrollbar{width:6px}
    .scrollbar-light::-webkit-scrollbar-track{background:transparent}
    .scrollbar-light::-webkit-scrollbar-thumb{background:#d5cdc4;border-radius:3px}
    .scrollbar-dark::-webkit-scrollbar{width:6px}
    .scrollbar-dark::-webkit-scrollbar-track{background:transparent}
    .scrollbar-dark::-webkit-scrollbar-thumb{background:#3a3530;border-radius:3px}
    /* iOS performance */
    *{-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
    body{-webkit-overflow-scrolling:touch;overscroll-behavior:none;}
    button{touch-action:manipulation;cursor:pointer;}
    input{-webkit-appearance:none;}
    .tab-content{will-change:contents;}

    /* ── Animations ── */
    @keyframes fadeUp      {from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes tabIn       {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ─────────────────────── ISLAMIC DATE ─────────────────────── */
function getIslamicDate(date) {
  if (!date) date = new Date();
  const jd = Math.floor((date.getTime() / 86400000) + 2440587.5);
  const l = jd - 1948440 + 10632, n = Math.floor((l - 1) / 10631);
  const ll = l - 10631 * n + 354;
  const j = Math.floor((10985 - ll) / 5316) * Math.floor((50 * ll) / 17719)
          + Math.floor(ll / 5670) * Math.floor((43 * ll) / 15238);
  const ll2 = ll - Math.floor((30 - j) / 15) * Math.floor((17719 * j) / 50)
            - Math.floor(j / 16) * Math.floor((15238 * j) / 43) + 29;
  const mo = Math.floor((24 * ll2) / 709), day = ll2 - Math.floor((709 * mo) / 24), year = 30 * n + j - 30;
  const EN = ["Muharram","Safar","Rabi' al-Awwal","Rabi' al-Thani","Jumada al-Awwal","Jumada al-Thani","Rajab","Sha'ban","Ramadan","Shawwal","Dhu al-Qi'dah","Dhu al-Hijjah"];
  return { day, month: EN[mo - 1], year };
}

/* ─────────────────────── PRAYER TIMES ─────────────────────── */
function toRad(d) { return d * Math.PI / 180; }
function toDeg(r) { return r * 180 / Math.PI; }

function calcPrayerTimes(date, lat, lng, method, shadowFactor) {
  if (!shadowFactor) shadowFactor = 1;
  const METHODS = { MWL:{fa:18,ia:17}, ISNA:{fa:15,ia:15}, Egypt:{fa:19.5,ia:17.5}, Makkah:{fa:18.5,im:90}, Karachi:{fa:18,ia:18} };
  const m = METHODS[method] || METHODS.MWL;

  // Days since J2000.0 — use exact timestamp, not floored
  const D = date.getTime() / 86400000 + 2440587.5 - 2451545.0;

  // Sun mean longitude, mean anomaly, equation of center
  const L0 = (280.46646 + 0.9856474 * D) % 360;
  const M0 = (357.52911 + 0.9856003 * D) % 360;
  const C  = (1.9146 - 0.004817*(D/36525)) * Math.sin(toRad(M0))
           + 0.019993 * Math.sin(toRad(2*M0))
           + 0.00029  * Math.sin(toRad(3*M0));
  const lsun = (L0 + C) % 360;

  // Obliquity and declination
  const obliq  = 23.439291111 - 0.013004167 * (D / 36525);
  const sinDec = Math.sin(toRad(obliq)) * Math.sin(toRad(lsun));
  const dec    = toDeg(Math.asin(sinDec));

  // Right ascension (hours) and Equation of Time (hours)
  const RA  = ((toDeg(Math.atan2(Math.cos(toRad(obliq)) * Math.sin(toRad(lsun)), Math.cos(toRad(lsun)))) / 15) + 24) % 24;
  const EqT = ((L0 / 15 - RA) + 12) % 24 - 12;

  // Solar noon in UTC hours
  const noonUTC = 12 - EqT - lng / 15;

  // Hour angle → UTC time
  const ha = (angleDeg, dir) => {
    const cosH = (Math.sin(toRad(angleDeg)) - Math.sin(toRad(lat)) * sinDec)
               / (Math.cos(toRad(lat)) * Math.cos(Math.asin(sinDec)));
    if (Math.abs(cosH) > 1) return null;
    const H = toDeg(Math.acos(cosH)) / 15;
    return dir === "rise" ? noonUTC - H : noonUTC + H;
  };

  // Asr: shadow factor 1 = Shafi'i/Maliki/Hanbali, 2 = Hanafi
  const asrUTC = (shadowFactor) => {
    const tgt  = Math.atan(1 / (shadowFactor + Math.tan(toRad(Math.abs(lat - dec)))));
    const cosH = (Math.sin(tgt) - Math.sin(toRad(lat)) * sinDec)
               / (Math.cos(toRad(lat)) * Math.cos(Math.asin(sinDec)));
    if (Math.abs(cosH) > 1) return null;
    return noonUTC + toDeg(Math.acos(cosH)) / 15;
  };

  // UTC → device local time
  const tzOff  = -date.getTimezoneOffset() / 60;
  const toLocal = h => h == null ? null : ((h + tzOff) % 24 + 24) % 24;
  const fmt = h => {
    if (h == null) return "--:--";
    const tot = Math.round(h * 60), hh = Math.floor(tot / 60) % 24, mm = tot % 60;
    return (hh % 12 || 12) + ":" + (mm < 10 ? "0" : "") + mm + (hh >= 12 ? " PM" : " AM");
  };

  const fajr    = ha(-m.fa,  "rise");
  const sunrise = ha(-0.833, "rise");
  const dhuhr   = noonUTC + 0.017;
  const asr     = asrUTC(shadowFactor);
  const maghrib = ha(-0.833, "set");
  const isha    = m.im ? (maghrib != null ? maghrib + m.im / 60 : null) : ha(-m.ia, "set");

  const mk = (id, name, ar, icon, raw) => ({ id, name, arabic: ar, icon, raw: toLocal(raw), formatted: fmt(toLocal(raw)) });
  return [
    mk("fajr",    "Fajr",    "الفجر",           "🌙", fajr),
    mk("sunrise", "Sunrise", "الشروق",      "🌅", sunrise),
    mk("dhuhr",   "Dhuhr",   "الظهر",           "☀️", dhuhr),
    mk("asr",     "Asr",     "العصر",           "🌤️", asr),
    mk("maghrib", "Maghrib", "المغرب",      "🌇", maghrib),
    mk("isha",    "Isha",    "العشاء",      "🌃", isha),
  ];
}

function getCurrentPrayer(times) {
  const nowH = new Date().getHours() + new Date().getMinutes() / 60;
  const ps = times.filter(t => t.id !== "sunrise" && t.raw != null);
  let cur = null;
  for (const p of ps) { if (p.raw <= nowH) cur = p.id; }
  return cur || "isha";
}
function getNextPrayer(times) {
  const nowH = new Date().getHours() + new Date().getMinutes() / 60;
  const ps = times.filter(t => t.id !== "sunrise" && t.raw != null);
  for (const p of ps) { if (p.raw > nowH) return p; }
  return ps[0];
}
function fmtCountdown(tH) {
  const n = new Date(), nowH = n.getHours() + n.getMinutes() / 60 + n.getSeconds() / 3600;
  let d = tH - nowH; if (d < 0) d += 24;
  const ts = Math.round(d * 3600), h = Math.floor(ts / 3600), m = Math.floor((ts % 3600) / 60), s = ts % 60;
  return h > 0 ? h + "h " + (m < 10 ? "0" : "") + m + "m" : m + "m " + (s < 10 ? "0" : "") + s + "s";
}

const PSK = "dhikr_prayer_settings";

/* ── Save Code System (self-contained, no server) ── */
const DHIKR_IDS = ["subhanallah","alhamdulillah","allahuakbar","astaghfirullah","lailahaillallah","lahaula","subhanallahiwabihamdihi","allahummaajirniminarnar"];
function encodeState(s) {
  try {
    const raw = [encodeURIComponent(s.name||""),
      DHIKR_IDS.map(id=>s.counts[id]||0).join(","),
      DHIKR_IDS.map(id=>s.targets[id]||33).join(","),
      s.totalSession||0, s.isDark?1:0].join("|");
    return btoa(unescape(encodeURIComponent(raw))).replace(/\+/g,"-").replace(/\//g,"_").replace(/=/g,"");
  } catch(e){return null;}
}
function decodeState(code) {
  try {
    const raw = decodeURIComponent(escape(atob(code.trim().replace(/-/g,"+").replace(/_/g,"/"))));
    const [namePart,cPart,tPart,sess,dark] = raw.split("|");
    if(!cPart) return null;
    const counts={}, targets={};
    cPart.split(",").forEach((v,i)=>{counts[DHIKR_IDS[i]]=parseInt(v)||0;});
    tPart.split(",").forEach((v,i)=>{targets[DHIKR_IDS[i]]=parseInt(v)||33;});
    return {name:decodeURIComponent(namePart),counts,targets,totalSession:parseInt(sess)||0,isDark:dark==="1"};
  } catch(e){return null;}
}


/* ─── STREAK TRACKER ─── */
const STREAK_KEY = "dhikr_streak";
function loadStreak() {
  try { return JSON.parse(localStorage.getItem(STREAK_KEY) || "{}"); } catch { return {}; }
}
function saveStreak(s) {
  try { localStorage.setItem(STREAK_KEY, JSON.stringify(s)); } catch {} 
}
function updateStreak(totalToday) {
  const today = new Date().toDateString();
  const s = loadStreak();
  if (totalToday === 0) return s;
  if (s.lastDate === today) return s;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  const current = (s.lastDate === yesterday) ? (s.current || 0) + 1 : 1;
  const best = Math.max(current, s.best || 0);
  const updated = { lastDate: today, current, best };
  saveStreak(updated);
  return updated;
}
function getStreak() { return loadStreak(); }

/* ─── WAKE LOCK (keep screen on in Tasbih) ─── */
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ("wakeLock" in navigator) { wakeLock = await navigator.wakeLock.request("screen"); }
  } catch {}
}
async function releaseWakeLock() {
  try { if (wakeLock) { await wakeLock.release(); wakeLock = null; } } catch {}
}

  );
}

function CircularProgress({ count, target, accent, th }) {
  const r=60, stroke=6, nr=r-stroke/2;
  const circ=2*Math.PI*nr, offset=circ-Math.min(count/target,1)*circ;
  return (
    <svg width={r*2} height={r*2} style={{ transform:"rotate(-90deg)", flexShrink:0 }}>
      <circle stroke={th.border2} fill="transparent" strokeWidth={stroke} r={nr} cx={r} cy={r}/>
      <circle stroke={accent} fill="transparent" strokeWidth={stroke} strokeLinecap="round"
        strokeDasharray={`${circ} ${circ}`} strokeDashoffset={offset}
        r={nr} cx={r} cy={r} style={{ transition:"stroke-dashoffset 0.35s ease" }}/>
    </svg>
  );
}

            background: target===t ? (isActive?"rgba(255,255,255,0.2)":(th.dark?dhikr.accent:dhikr.color)) : "transparent",
            color: target===t ? "white" : (isActive?"rgba(255,255,255,0.5)":(th.dark?dhikr.accent:dhikr.color)),
          }}>{t}</button>

      </div>
      {cycles>0 && (
        <div style={{ marginTop:8, textAlign:"center", fontSize:10, fontWeight:600, color:isActive?"rgba(255,255,255,0.6)":(th.dark?dhikr.accent:dhikr.accent), letterSpacing:0.3 }}>

function LocationSearch({ th, isMobile, onSelect, currentCity, G }) {
  const [open,       setOpen]       = useState(false);
  const [query,      setQuery]      = useState("");
  const [results,    setResults]    = useState([]);
  const [searching,  setSearching]  = useState(false);
  const [manualMode, setManualMode] = useState(false);
  const [manLat,     setManLat]     = useState("");
  const [manLng,     setManLng]     = useState("");
  const [manErr,     setManErr]     = useState("");
  const [dropPos,    setDropPos]    = useState({ top:0, left:0, width:360 });
  const btnRef  = useRef();
  const inputRef = useRef();

  // Calculate dropdown position from button
  const openDropdown = () => {
    if (btnRef.current) {
      const r = btnRef.current.getBoundingClientRect();
      setDropPos({
        top:  r.bottom + 8,
        left: Math.min(r.left, window.innerWidth - (isMobile ? Math.min(380, window.innerWidth - 32) : 380) - 8),
        width: isMobile ? Math.min(380, window.innerWidth - 32) : 380,
      });
    }
    setOpen(true);
  };

  useEffect(() => { if (open) setTimeout(() => inputRef.current?.focus(), 120); }, [open]);

  // Close on outside click
  useEffect(() => {
    if (!open) return;
    const h = e => { if (!e.target.closest('[data-locsearch]')) setOpen(false); };
    document.addEventListener('mousedown', h);
    return () => document.removeEventListener('mousedown', h);
  }, [open]);

  const doSearch = async (q) => {
    if (!q.trim()) { setResults([]); return; }
    setSearching(true);
    try {
      const res = await fetch("https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(q) + "&count=6&language=en&format=json");
      const data = await res.json();
      setResults(data.results || []);
    } catch { setResults([]); }
    setSearching(false);
  };

  useEffect(() => { const t = setTimeout(() => doSearch(query), 400); return () => clearTimeout(t); }, [query]);

  const applyManual = () => {
    const lat = parseFloat(manLat), lng = parseFloat(manLng);
    if (isNaN(lat) || lat < -90  || lat > 90)  { setManErr("Latitude must be −90 to 90");   return; }
    if (isNaN(lng) || lng < -180 || lng > 180) { setManErr("Longitude must be −180 to 180"); return; }
    setManErr("");
    onSelect({ lat, lng, city: lat.toFixed(3) + "°, " + lng.toFixed(3) + "°" });
    setOpen(false); setQuery(""); setResults([]);
  };

  const close = () => { setOpen(false); setQuery(""); setResults([]); setManErr(""); };

  const inpStyle = { padding:"9px 12px", borderRadius:10, border:"1.5px solid "+th.border, background:th.inputBg, color:th.text, fontSize:13, fontFamily:"inherit", fontWeight:500, outline:"none", flex:1, minWidth:0 };

  return (
    <div data-locsearch="1" style={{ position:"relative", display:"inline-block" }}>
      <button ref={btnRef} onClick={() => open ? close() : openDropdown()} style={{ display:"flex", alignItems:"center", gap:6, padding:"6px 14px", borderRadius:20, border: open?"none":"1.5px solid "+th.border2, background: open?G:"transparent", color: open?"white":th.textMuted, fontSize:11, fontWeight:700, cursor:"pointer", fontFamily:"inherit", transition:"all 0.17s", whiteSpace:"nowrap" }}>
        <span>&#128205;</span> {currentCity || "Set Location"}
      </button>

      {open && (
        <div data-locsearch="1" style={{ position:"fixed", top:dropPos.top, left:dropPos.left, width:dropPos.width, zIndex:9000, background:th.surface, borderRadius:16, border:"1.5px solid "+th.border, boxShadow:th.dark?"0 16px 48px rgba(0,0,0,0.6)":"0 16px 48px rgba(0,0,0,0.18)", animation:"slideDown 0.18s ease", overflow:"hidden" }}>

          {/* Mode tabs */}
          <div style={{ display:"flex", borderBottom:"1px solid "+th.border }}>
            {["Search City","Manual Coords"].map((lbl,i) => (
              <button key={i} onClick={() => setManualMode(i===1)} style={{ flex:1, padding:"11px 8px", border:"none", cursor:"pointer", fontFamily:"inherit", fontSize:11, fontWeight:700, letterSpacing:0.5, textTransform:"uppercase", background:(manualMode===(i===1))?(th.dark?"rgba(64,145,108,0.15)":"rgba(64,145,108,0.07)"):"transparent", color:(manualMode===(i===1))?G:th.textMuted, borderBottom:(manualMode===(i===1))?"2px solid "+G:"2px solid transparent", transition:"all 0.17s" }}>{lbl}</button>
            ))}
          </div>

          {!manualMode ? (
            <div>
              {/* Search input */}
              <div style={{ padding:"12px 14px", borderBottom:"1px solid "+th.border, display:"flex", alignItems:"center", gap:8 }}>
                <span style={{ fontSize:14, opacity:0.5, flexShrink:0 }}>&#128269;</span>
                <input ref={inputRef} value={query} onChange={e => setQuery(e.target.value)} placeholder="Search city or country…"
                  style={{ flex:1, border:"none", background:"transparent", color:th.text, fontSize:14, fontFamily:"inherit", fontWeight:500, outline:"none", minWidth:0 }}/>
                {searching && <span style={{ fontSize:11, color:th.textFaint, flexShrink:0 }}>&#8230;</span>}
                {query && !searching && <span onClick={() => { setQuery(""); setResults([]); }} style={{ fontSize:20, color:th.textFaint, cursor:"pointer", lineHeight:1, flexShrink:0, userSelect:"none" }}>&times;</span>}
              </div>
              {/* Results */}
              <div style={{ maxHeight:220, overflowY:"auto" }}>
                {results.length===0 && query.trim() && !searching && <div style={{ padding:"20px", textAlign:"center", color:th.textFaint, fontSize:13 }}>No results found</div>}
                {results.length===0 && !query.trim() && (
                  <div style={{ padding:"16px", color:th.textFaint, fontSize:12, lineHeight:1.8 }}>
                    Type a city name to search.<br/>
                    <span style={{ color:G, fontWeight:600, cursor:"pointer" }} onClick={() => setManualMode(true)}>Or enter coordinates manually →</span>
                  </div>
                )}
                {results.map((r,i) => (
                  <div key={i} onClick={() => { onSelect({ lat:r.latitude, lng:r.longitude, city:r.name+(r.country?", "+r.country:"") }); close(); }}
                    style={{ padding:"11px 16px", cursor:"pointer", display:"flex", alignItems:"center", gap:10, borderBottom:i<results.length-1?"1px solid "+th.border:"none", transition:"background 0.12s" }}
                    onMouseEnter={e=>e.currentTarget.style.background=th.dark?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.03)"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <span style={{ flexShrink:0 }}>&#127970;</span>
                    <div style={{ minWidth:0 }}>
                      <div style={{ fontSize:13, fontWeight:600, color:th.text, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{r.name}{r.admin1?", "+r.admin1:""}</div>
                      <div style={{ fontSize:11, color:th.textFaint, marginTop:1 }}>{r.country} · {r.latitude.toFixed(2)}°, {r.longitude.toFixed(2)}°</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ) : (
            <div style={{ padding:"16px" }}>
              <div style={{ fontSize:12, color:th.textMuted, marginBottom:12, lineHeight:1.7 }}>
                Enter decimal latitude and longitude.<br/>
                <span style={{ color:th.textFaint }}>e.g. Chennai: <strong style={{ color:th.text }}>13.0827</strong>, <strong style={{ color:th.text }}>80.2707</strong></span>
              </div>
              <div style={{ display:"flex", gap:8, marginBottom:4 }}>
                <input value={manLat} onChange={e=>setManLat(e.target.value)} placeholder="Latitude" style={inpStyle}
                  onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor=th.border}/>
                <input value={manLng} onChange={e=>setManLng(e.target.value)} placeholder="Longitude" style={inpStyle}
                  onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor=th.border}
                  onKeyDown={e=>e.key==="Enter"&&applyManual()}/>
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:10, color:th.textFaint, paddingLeft:2 }}>
                <span>Latitude (-90 to 90)</span><span>Longitude (-180 to 180)</span>
              </div>
              {manErr && <div style={{ marginTop:8, fontSize:11, color:"#c8612a", fontWeight:600 }}>{manErr}</div>}
              <button onClick={applyManual} style={{ marginTop:12, width:"100%", padding:"11px", borderRadius:12, border:"none", background:G, color:"white", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>Apply</button>
            </div>
          )}

          <div style={{ padding:"10px 16px", borderTop:"1px solid "+th.border, textAlign:"right" }}>
            <button onClick={close} style={{ fontSize:11, color:th.textFaint, border:"none", background:"none", cursor:"pointer", fontFamily:"inherit", fontWeight:600 }}>Close</button>
          </div>
        </div>
      )}
    </div>
  );
}

function PrayerTimesTab({ th, isMobile }) {
  const saved  = useMemo(() => loadPS(), []);
  const [location, setLocation] = useState(saved?.location || null);
  const [locError, setLocError] = useState(null);
  const [loading,  setLoading]  = useState(!saved?.location);
  const [now,      setNow]      = useState(new Date());
  const [method,   setMethod]   = useState(saved?.method   || "MWL");
  const [madhab,   setMadhab]   = useState(saved?.madhab   || "shafii");
  const [cityName, setCityName] = useState(saved?.cityName || "");
  const verse  = useMemo(() => todaysVerse(), []);
  const dayNum = useMemo(() => getDayOfYear(), []);
  const G = "#40916c";

  // Persist prayer settings whenever they change
  useEffect(() => { savePS({ location, cityName, method, madhab }); }, [location, cityName, method, madhab]);
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 1000); return () => clearInterval(t); }, []);

  const geoRan = useRef(false);
  useEffect(() => {
    if (location) return; // skip if we already have a saved location
    if (geoRan.current) return;
    geoRan.current = true;
    if (!navigator.geolocation) { setLoading(false); return; }
    navigator.geolocation.getCurrentPosition(
      p  => { setLocation({ lat: p.coords.latitude, lng: p.coords.longitude }); setLoading(false); },
      () => { setLocError("Auto-detect failed — tap Set Location to pick your city."); setLoading(false); },
      { timeout: 8000, maximumAge: 600000 }
    );
  }, []);

  const handleSelect = ({ lat, lng, city }) => { setLocation({ lat, lng }); setCityName(city); setLocError(null); };

  const todayTimes  = useMemo(() => location ? calcPrayerTimes(now,      location.lat, location.lng, method, madhab === "hanafi" ? 2 : 1) : [], [location, now.toDateString(), method, madhab]);
  const tomDate     = useMemo(() => { const d = new Date(now); d.setDate(d.getDate() + 1); return d; }, [now.toDateString()]);
  const tomTimes    = useMemo(() => location ? calcPrayerTimes(tomDate,  location.lat, location.lng, method, madhab === "hanafi" ? 2 : 1) : [], [location, tomDate, method, madhab]);
  const idate       = useMemo(() => getIslamicDate(now),     [now.toDateString()]);
  const idateTom    = useMemo(() => getIslamicDate(tomDate), [tomDate]);
  const curPrayer   = useMemo(() => getCurrentPrayer(todayTimes), [todayTimes, now.getMinutes()]);
  const nextPrayer  = useMemo(() => getNextPrayer(todayTimes),    [todayTimes, now.getMinutes()]);

  if (loading) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", minHeight:300, color:th.textMuted }}>
      <div style={{ textAlign:"center" }}>
        <div style={{ fontSize:36, marginBottom:12 }}>🕌</div>
        <div style={{ fontSize:14, fontWeight:500 }}>Locating you…</div>
      </div>
    </div>
  );

  if (!location) return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", minHeight:300 }}>
      <div style={{ textAlign:"center", maxWidth:320 }}>
        <div style={{ fontSize:48, marginBottom:16 }}>📍</div>
        <div style={{ fontSize:18, fontWeight:800, color:th.text, marginBottom:8 }}>Set your location</div>
        <div style={{ fontSize:14, color:th.textMuted, marginBottom:24, lineHeight:1.6 }}>
          {locError || "Choose your city to see accurate prayer times."}
        </div>
        <LocationSearch th={th} isMobile={isMobile} onSelect={handleSelect} currentCity={cityName} G={G}/>
      </div>
    </div>
  );

  const heroBg = th.dark ? "linear-gradient(135deg,#1a2e22 0%,#111009 100%)" : "linear-gradient(135deg,#e8f5ee 0%,#f5f1eb 100%)";

  return (
    <div style={{ animation:"fadeUp 0.35s ease" }}>

      {/* Islamic Date + Clock hero */}
      <div style={{ borderRadius:20, border:`1.5px solid ${th.border}`, padding:isMobile?"22px 20px":"30px 40px", marginBottom:isMobile?14:20, position:"relative", background:heroBg }}>
        <div style={{ position:"absolute", top:-60, right:-60, width:200, height:200, borderRadius:"50%", background:th.dark?"rgba(64,145,108,0.08)":"rgba(64,145,108,0.1)", pointerEvents:"none" }}/>
        <div style={{ position:"absolute", bottom:-40, left:-40, width:140, height:140, borderRadius:"50%", background:th.dark?"rgba(64,145,108,0.05)":"rgba(64,145,108,0.07)", pointerEvents:"none" }}/>
        <div style={{ position:"relative", display:"flex", flexDirection:isMobile?"column":"row", alignItems:isMobile?"flex-start":"center", justifyContent:"space-between", gap:16 }}>
          <div>
            <div style={{ fontSize:11, fontWeight:700, letterSpacing:2.5, textTransform:"uppercase", color:G, marginBottom:8 }}>Islamic Date</div>
            <div style={{ fontFamily:"'Amiri',Georgia,serif", fontSize:isMobile?28:36, fontWeight:700, color:th.text, lineHeight:1.2, marginBottom:4 }}>{idate.day} {idate.month}</div>
            <div style={{ fontSize:15, fontWeight:600, color:th.textSub }}>{idate.year} AH</div>
            <div style={{ marginTop:9, fontSize:11, color:th.textMuted, fontWeight:500 }}>{now.toLocaleDateString([], { weekday:"long", year:"numeric", month:"long", day:"numeric" })}</div>
            <div style={{ marginTop:10 }}>
              <LocationSearch th={th} isMobile={isMobile} onSelect={handleSelect} currentCity={cityName} G={G}/>
            </div>
            {locError && <div style={{ marginTop:6, fontSize:10, color:"#c8612a", fontWeight:600 }}>⚠️ {locError}</div>}
          </div>
          <div style={{ textAlign:isMobile?"left":"right" }}>
            <div style={{ fontSize:isMobile?38:52, fontWeight:800, letterSpacing:-1, color:th.text, lineHeight:1, fontVariantNumeric:"tabular-nums" }}>
              {now.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" })}
            </div>
            <div style={{ fontSize:14, color:th.textMuted, marginTop:4 }}>{String(now.getSeconds()).padStart(2,"0")}s</div>
            {nextPrayer && (
              <div style={{ marginTop:12, display:"inline-flex", alignItems:"center", gap:8, background:th.dark?"rgba(64,145,108,0.15)":"rgba(64,145,108,0.1)", borderRadius:100, padding:"6px 14px", border:"1px solid "+(th.dark?"rgba(64,145,108,0.3)":"rgba(64,145,108,0.2)") }}>
                <div style={{ width:6, height:6, borderRadius:"50%", background:G, animation:"celebGlowPulse 1.2s ease infinite" }}/>
                <span style={{ fontSize:11, fontWeight:700, color:G }}>{nextPrayer.name} in {fmtCountdown(nextPrayer.raw)}</span>
              </div>
            )}
          </div>
        </div>
      </div>

      <PrayerCard label="Today"    islamicDate={idate}    times={todayTimes} currentPrayer={curPrayer} th={th} isMobile={isMobile} isToday={true}  />
      <PrayerCard label="Tomorrow" islamicDate={idateTom} times={tomTimes}   currentPrayer={null}      th={th} isMobile={isMobile} isToday={false} />

      {/* Verse of the Day */}
      <div style={{ background:th.surface, borderRadius:20, border:`1.5px solid ${th.border}`, padding:isMobile?"20px":"30px 40px", position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", top:-50, right:-50, width:180, height:180, borderRadius:"50%", background:th.dark?"rgba(64,145,108,0.05)":"rgba(216,243,220,0.5)", pointerEvents:"none" }}/>
        {isMobile ? (
          <div style={{ position:"relative" }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
              <div style={{ fontSize:10, fontWeight:700, letterSpacing:2, textTransform:"uppercase", color:th.textMuted }}>Verse of the Day</div>
              <div style={{ fontSize:10, color:th.textFaint, fontWeight:500 }}>Day {dayNum} / 365</div>
            </div>
            <div style={{ width:"100%", height:1, background:th.border, marginBottom:16 }}/>
            <div style={{ fontFamily:"'Amiri',Georgia,serif", fontSize:22, color:th.text, direction:"rtl", textAlign:"right", lineHeight:2, marginBottom:14, fontWeight:400 }}>{verse.a}</div>
            <div style={{ fontFamily:"'Lora',Georgia,serif", fontSize:14, lineHeight:1.8, color:th.text, fontStyle:"italic", marginBottom:10 }}>"{verse.t}"</div>
            <div style={{ display:"flex", alignItems:"center", gap:8 }}>
              <div style={{ width:22, height:2, background:G, borderRadius:1, opacity:0.6 }}/>
              <div style={{ fontSize:11, color:th.dark?"#40916c":"#7a9a88", fontWeight:600 }}>{verse.r}</div>
            </div>
          </div>
        ) : (
          <div style={{ display:"flex", alignItems:"flex-start", gap:32, position:"relative" }}>
            <div style={{ flexShrink:0, paddingTop:4 }}>
              <div style={{ fontSize:10, fontWeight:700, letterSpacing:2, textTransform:"uppercase", color:th.textMuted, marginBottom:6, whiteSpace:"nowrap" }}>Verse of the Day</div>
              <div style={{ fontSize:11, color:th.textFaint, fontWeight:500 }}>Day {dayNum} / 365</div>
            </div>
            <div style={{ width:1, background:th.border, alignSelf:"stretch", flexShrink:0 }}/>
            <div style={{ flex:1 }}>
              <div style={{ fontFamily:"'Amiri',Georgia,serif", fontSize:28, color:th.text, direction:"rtl", textAlign:"right", lineHeight:2, marginBottom:16, fontWeight:400 }}>{verse.a}</div>
              <div style={{ fontFamily:"'Lora',Georgia,serif", fontSize:15.5, lineHeight:1.85, color:th.text, fontStyle:"italic", marginBottom:14 }}>"{verse.t}"</div>
              <div style={{ display:"flex", alignItems:"center", gap:10 }}>

                <div style={{ fontSize:11.5, color:th.dark?"#40916c":"#7a9a88", fontWeight:600, letterSpacing:0.3 }}>{verse.r}</div>

      {/* Calculation method + Madhab */}
      <div style={{ marginTop:16, display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
        <span style={{ fontSize:10, fontWeight:700, letterSpacing:1, textTransform:"uppercase", color:th.textFaint }}>Method</span>
        {["MWL","ISNA","Egypt","Makkah","Karachi"].map(mt => (
          <button key={mt} onClick={()=>setMethod(mt)} style={{ padding:"4px 12px", borderRadius:20, fontSize:10, fontWeight:700, cursor:"pointer", fontFamily:"inherit", transition:"all 0.17s", border:method===mt?"none":`1.5px solid ${th.border2}`, background:method===mt?G:"transparent", color:method===mt?"white":th.textMuted }}>{mt}</button>
        ))}

        {[{id:"shafii", label:"Shafi'i / Maliki / Hanbali"}, {id:"hanafi", label:"Hanafi"}].map(md => (
          <button key={md.id} onClick={()=>setMadhab(md.id)} style={{ padding:"4px 12px", borderRadius:20, fontSize:10, fontWeight:700, cursor:"pointer", fontFamily:"inherit", transition:"all 0.17s", border:madhab===md.id?"none":`1.5px solid ${th.border2}`, background:madhab===md.id?G:"transparent", color:madhab===md.id?"white":th.textMuted }}>{md.label}</button>
        ))}

      <div style={{ textAlign:"center", marginTop:28, fontFamily:"'Amiri',Georgia,serif", fontSize:16, color:th.textFaint, letterSpacing:1 }}>

  );

/* ── TASBIH MODE ── */
function TasbihMode({ th, isDark, isMobile, onClose, counts, targets, onTap, onReset, onUndo, updateTarget }) {
  const [selId,      setSelId]      = useState("subhanallah");
  const [switching,  setSwitching]  = useState(false);
  const [ripples,    setRipples]    = useState([]);
  const [animKey,    setAnimKey]    = useState(0);
  const [pressing,   setPressing]   = useState(false);
  const [showPicker, setShowPicker] = useState(false);
  const [canUndo,    setCanUndo]    = useState(false);
  const ripId    = useRef(0);
  const pressRef = useRef(null);
  const undoRef  = useRef(null);

  const dhikr  = DHIKR_LIST.find(d => d.id === selId);
  const count  = counts[selId]  || 0;
  const target = targets[selId] || 33;
  const cycles = Math.floor(count / target);
  const disp   = (count % target === 0 && count > 0) ? target : count % target;
  const pct    = Math.min(disp / target, 1);
  const sz     = isMobile ? 260 : 300;
  const mid    = sz / 2;
  const rad    = mid - 16;
  const circ   = 2 * Math.PI * rad;

  // doTap defined BEFORE useEffect
  function undoTap() {
    if (!canUndo) return;
    onUndo(selId);
    setCanUndo(false);
    if (undoRef.current) clearTimeout(undoRef.current);
    if (navigator.vibrate) navigator.vibrate([10, 30, 10]);
  }

  function doTap(clientX, clientY) {
    onTap(selId);
    setAnimKey(k => k + 1);
    if (navigator.vibrate) navigator.vibrate(12);
    setPressing(true);
    if (pressRef.current) clearTimeout(pressRef.current);
    pressRef.current = setTimeout(() => setPressing(false), 160);
    setCanUndo(true);
    if (undoRef.current) clearTimeout(undoRef.current);
    undoRef.current = setTimeout(() => setCanUndo(false), 4000);
    const id = ++ripId.current;
    const x = clientX != null ? clientX : window.innerWidth / 2;
    const y = clientY != null ? clientY : window.innerHeight / 2;
    setRipples(r => [...r, {id, x, y}]);
    setTimeout(() => setRipples(r => r.filter(rr => rr.id !== id)), 800);
  }

  // Wake lock — keep screen on while counting
  useEffect(() => {
    requestWakeLock();
    return () => releaseWakeLock();
  }, []);

  // Spacebar + U to undo
  useEffect(() => {
    const h = e => {
      if (e.code === "Space" && !showPicker) { e.preventDefault(); doTap(null, null); }
      if (e.code === "KeyU" && !showPicker && canUndo) { e.preventDefault(); undoTap(); }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [selId, showPicker, canUndo]);

  function handleScreenClick(e) {
    doTap(e.clientX, e.clientY);
  }

  function switchDhikr(id) {
    if (id === selId) { setShowPicker(false); return; }
    setSwitching(true);
    setTimeout(() => { setSelId(id); setSwitching(false); }, 180);
    setShowPicker(false);
  }

  const glass  = isDark ? "rgba(255,255,255,0.08)"  : "rgba(255,255,255,0.8)";
  const glassC = isDark ? "rgba(255,255,255,0.65)"  : "rgba(0,0,0,0.55)";
  const glassB = isDark ? "rgba(255,255,255,0.12)"  : "rgba(0,0,0,0.1)";
  const accent = isDark ? dhikr.accent : dhikr.color;

  return (
    <div
      onClick={handleScreenClick}
      style={{
        position:"fixed", inset:0, zIndex:8000,
        display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
        userSelect:"none", WebkitUserSelect:"none", overflow:"hidden", cursor:"pointer",
        animation:"tasbihIn 0.32s cubic-bezier(0.22,1,0.36,1)",
        transition:"background 0.5s ease",
        background: isDark
          ? "radial-gradient(ellipse at 40% 35%,"+dhikr.color+"60 0%,#060403 65%)"
          : "radial-gradient(ellipse at 40% 35%,"+dhikr.light+"ee 0%,#eae6de 65%)",
      }}>

      {/* Ripples */}
      {ripples.map(rp => (
        <div key={rp.id} style={{
          position:"fixed", pointerEvents:"none",
          left:rp.x-60, top:rp.y-60, width:120, height:120, borderRadius:"50%",
          background:dhikr.accent+"28",
          animation:"tasbihRing 0.7s cubic-bezier(0.22,1,0.36,1) forwards", zIndex:1,
        }}/>
      ))}

      {/* Blobs */}
      <div style={{position:"absolute",top:"-18%",right:"-12%",width:"55vw",height:"55vw",borderRadius:"50%",background:dhikr.accent+"16",pointerEvents:"none",transition:"background 0.5s ease"}}/>
      <div style={{position:"absolute",bottom:"-14%",left:"-10%",width:"44vw",height:"44vw",borderRadius:"50%",background:dhikr.color+"10",pointerEvents:"none",transition:"background 0.5s ease"}}/>

      {/* Top bar */}
      <div onClick={e=>e.stopPropagation()} style={{position:"absolute",top:0,left:0,right:0,padding:isMobile?"14px 18px":"18px 32px",display:"flex",alignItems:"center",justifyContent:"space-between",zIndex:20}}>
        <button onClick={e=>{e.stopPropagation();onClose();}} style={{display:"flex",alignItems:"center",gap:7,padding:"8px 16px",borderRadius:50,border:"1.5px solid "+glassB,background:glass,color:glassC,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>← Exit</button>
        <button onClick={e=>{e.stopPropagation();setShowPicker(p=>!p);}} style={{display:"flex",alignItems:"center",gap:7,padding:"8px 18px",borderRadius:50,border:"1.5px solid "+dhikr.accent+"55",background:isDark?dhikr.color+"35":dhikr.light+"ee",color:accent,fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)",transition:"background 0.3s ease,color 0.3s ease"}}>
          {dhikr.transliteration} ▾
        </button>
      </div>

      {/* Picker */}
      {showPicker && (
        <div onClick={e=>{e.stopPropagation();setShowPicker(false);}} style={{position:"absolute",inset:0,zIndex:30,display:"flex",alignItems:"flex-start",justifyContent:"flex-end",paddingTop:isMobile?56:68,paddingRight:isMobile?18:32}}>
          <div onClick={e=>e.stopPropagation()} style={{background:isDark?"rgba(20,17,12,0.97)":"rgba(255,255,255,0.98)",backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",borderRadius:20,overflow:"hidden",border:"1.5px solid "+(isDark?"#2e2924":"#e0dbd2"),boxShadow:"0 24px 70px rgba(0,0,0,0.4)",minWidth:230,animation:"popIn 0.22s cubic-bezier(0.22,1,0.36,1)"}}>
            {DHIKR_LIST.map((d,i) => (
              <div key={d.id} onClick={()=>switchDhikr(d.id)}
                style={{padding:"13px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,background:selId===d.id?(isDark?d.color+"28":d.light+"99"):"transparent",borderBottom:i<DHIKR_LIST.length-1?"1px solid "+(isDark?"#252018":"#f0ece6"):"none",transition:"background 0.12s"}}>
                <div style={{width:10,height:10,borderRadius:"50%",background:d.accent,flexShrink:0,boxShadow:"0 0 0 3px "+d.accent+"30"}}/>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:isDark?"#f0ebe0":"#1c1812",marginBottom:1}}>{d.transliteration}</div>
                  <div style={{fontFamily:"'Amiri',Georgia,serif",fontSize:15,color:d.accent,direction:"rtl",lineHeight:1.4}}>{d.arabic}</div>
                </div>
                {selId===d.id && <div style={{marginLeft:"auto",fontSize:13,color:d.accent}}>✓</div>}
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Main content — fades on dhikr switch */}
      <div onClick={e=>e.stopPropagation()}
        style={{
          display:"flex", flexDirection:"column", alignItems:"center", gap:isMobile?18:26,
          opacity:switching?0:1,
          transform:switching?"translateY(-10px) scale(0.96)":"translateY(0) scale(1)",
          transition:"opacity 0.18s ease, transform 0.18s ease",
          pointerEvents:"none",
        }}>

        {/* Arabic */}
        <div style={{textAlign:"center"}}>
          <div style={{fontFamily:"'Amiri',Georgia,serif",fontSize:isMobile?38:52,fontWeight:700,direction:"rtl",color:accent,lineHeight:1.3,marginBottom:6,transition:"color 0.4s ease"}}>{dhikr.arabic}</div>
          <div style={{fontSize:isMobile?11:13,fontWeight:700,letterSpacing:2.5,textTransform:"uppercase",color:isDark?"rgba(255,255,255,0.32)":"rgba(0,0,0,0.28)",transition:"color 0.4s ease"}}>{dhikr.translation}</div>
        </div>

        {/* Circle */}
        <div style={{position:"relative",pointerEvents:"auto",cursor:"pointer"}} onClick={e=>{e.stopPropagation();doTap(e.clientX,e.clientY);}}>
          <svg width={sz} height={sz} style={{position:"absolute",top:0,left:0,pointerEvents:"none",transform:"rotate(-90deg)"}}>
            <circle cx={mid} cy={mid} r={rad} fill="none" stroke={isDark?"rgba(255,255,255,0.07)":"rgba(0,0,0,0.06)"} strokeWidth={8}/>
            {pct > 0 && (
              <circle cx={mid} cy={mid} r={rad} fill="none"
                stroke={accent} strokeWidth={8} strokeLinecap="round"
                strokeDasharray={circ} strokeDashoffset={circ - pct * circ}
                style={{transition:"stroke-dashoffset 0.28s cubic-bezier(0.22,1,0.36,1),stroke 0.4s ease"}}/>
            )}
          </svg>

          <div style={{
            width:sz, height:sz, borderRadius:"50%",
            background: isDark
              ? "radial-gradient(circle at 35% 30%,"+dhikr.color+"70,"+dhikr.color+"25)"
              : "radial-gradient(circle at 35% 30%,#ffffff,"+dhikr.light+"cc)",
            border:"2.5px solid "+(isDark?dhikr.accent+"28":dhikr.mid+"65"),
            display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
            WebkitTapHighlightColor:"transparent",
            boxShadow: isDark
              ? "0 0 100px "+dhikr.color+"40,inset 0 2px 0 rgba(255,255,255,0.08)"
              : "0 24px 70px "+dhikr.mid+"88,inset 0 2px 0 rgba(255,255,255,1)",
            transition:"box-shadow 0.4s ease,background 0.4s ease,transform 0.12s cubic-bezier(0.22,1,0.36,1)",
            transform: pressing ? "scale(0.95)" : "scale(1)",
          }}>
            <div key={animKey} style={{
              fontSize:isMobile?84:100, fontWeight:900, color:accent,
              lineHeight:1, fontVariantNumeric:"tabular-nums",
              fontFamily:"'Inter',sans-serif", letterSpacing:-4,
              animation:animKey>0?"countPop 0.32s cubic-bezier(0.22,1,0.36,1) both":"none",
              transition:"color 0.4s ease",
            }}>{disp}</div>
            <div style={{fontSize:isMobile?14:16,color:isDark?"rgba(255,255,255,0.25)":"rgba(0,0,0,0.25)",fontWeight:600,marginTop:4,letterSpacing:1}}>/ {target}</div>
          </div>
        </div>

        {/* Cycles + Reset */}
        <div style={{display:"flex",alignItems:"center",gap:18,pointerEvents:"auto"}}>
          {cycles > 0 && (
            <div style={{textAlign:"center",minWidth:50}}>
              <div style={{fontSize:isMobile?26:30,fontWeight:900,color:accent,lineHeight:1,transition:"color 0.4s ease"}}>{cycles}</div>
              <div style={{fontSize:9,fontWeight:700,letterSpacing:1.8,textTransform:"uppercase",color:isDark?"rgba(255,255,255,0.26)":"rgba(0,0,0,0.26)",marginTop:3}}>{cycles===1?"cycle":"cycles"}</div>
            </div>
          )}
          <button onClick={e=>{e.stopPropagation();onReset(selId);}} style={{padding:"9px 24px",borderRadius:50,border:"1.5px solid "+glassB,background:glass,color:glassC,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>Reset</button>
          {canUndo && <button onClick={e=>{e.stopPropagation();undoTap();}} style={{padding:"9px 20px",borderRadius:50,border:"1.5px solid rgba(200,97,42,0.4)",background:"rgba(200,97,42,0.12)",color:isDark?"#f4a070":"#c8612a",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",animation:"fadeUp 0.2s ease",backdropFilter:"blur(12px)",WebkitBackdropFilter:"blur(12px)"}}>↩ Undo</button>}
        </div>

        {/* Target selector */}
        <div style={{display:"flex",alignItems:"center",gap:8,pointerEvents:"auto"}}>
          <span style={{fontSize:10,fontWeight:700,letterSpacing:1.8,textTransform:"uppercase",color:isDark?"rgba(255,255,255,0.26)":"rgba(0,0,0,0.26)"}}>Target</span>
          {[33,34,100].map(t => (
            <button key={t} onClick={e=>{e.stopPropagation();updateTarget(selId,t);}}
              style={{width:42,height:28,borderRadius:50,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",
                transition:"all 0.2s cubic-bezier(0.22,1,0.36,1)",
                border:target===t?"none":"1.5px solid "+(isDark?"rgba(255,255,255,0.16)":"rgba(0,0,0,0.12)"),
                background:target===t?accent:"transparent",
                color:target===t?"white":(isDark?"rgba(255,255,255,0.42)":"rgba(0,0,0,0.36)"),
                transform:target===t?"scale(1.08)":"scale(1)",
              }}>{t}</button>
          ))}
        </div>
      </div>

      {/* Hint */}
      <div style={{position:"absolute",bottom:isMobile?18:26,left:"50%",transform:"translateX(-50%)",whiteSpace:"nowrap",fontSize:10,fontWeight:700,letterSpacing:2.5,textTransform:"uppercase",color:isDark?"rgba(255,255,255,0.14)":"rgba(0,0,0,0.14)"}}>
        Tap anywhere · Space · U to undo
      </div>
    </div>
  );
}
/* ── SAVE CODE MODAL ── */
function SaveCodeModal({ th, isMobile, onClose, currentState, onRestore }) {
  const G = "#40916c";
  const [view,   setView]   = useState("home");
  const [code,   setCode]   = useState("");
  const [input,  setInput]  = useState("");
  const [copied, setCopied] = useState(false);
  const [error,  setError]  = useState("");
  const [ok,     setOk]     = useState(false);

  function generate() {
    const c = encodeState(currentState);
    if (!c) { setError("Could not generate. Try again."); return; }
    setCode(c); setView("save"); setError("");
  }
  function restore() {
    setError("");
    const d = decodeState(input.trim());
    if (!d) { setError("Invalid code — paste the full code exactly."); return; }
    onRestore(d); setOk(true); setTimeout(onClose, 800);
  }
  function copy() {

/* ─────────────────────── MOBILE DETECT ────────────────────── */
function useIsMobile() {
  const check = () => window.innerWidth < 768 || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  const [mobile, setMobile] = useState(check);
  useEffect(() => {
    const h = () => setMobile(check());
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return mobile;
}

/* ─────────────────────── APP ───────────────────────────────── */
function App() {
  const saved = load();
  const [name,         setName]         = useState(saved.name);
  const [counts,       setCounts]       = useState({...DEFS.counts, ...saved.counts});
  const [targets,      setTargets]      = useState({...DEFS.targets, ...saved.targets});
  const [totalSession, setTotalSession] = useState(saved.totalSession);
  const [isDark,       setIsDark]       = useState(saved.isDark);
  const [activeId,     setActiveId]     = useState("subhanallah");
  const [showSettings, setShowSettings] = useState(false);
  const [notification, setNotification] = useState(null);
  const [editingName,  setEditingName]  = useState(false);
  const [nameInput,    setNameInput]    = useState("");
  const [celebration,  setCelebration]  = useState(null);
  const [activeTab,    setActiveTab]    = useState("home");
  const [showSave,     setShowSave]     = useState(false);
  const toastRef = useRef();
  const isMobile = useIsMobile();
  const G = "#40916c";
  const TABS = [
    {id:"home",   label:"Home",    icon:"🏠", desc:"Dashboard"},
    {id:"tasbih", label:"Tasbih",  icon:"📿", desc:"Dhikr counter"},
    {id:"prayer", label:"Prayer",  icon:"🕌", desc:"Prayer times"},
    {id:"names",  label:"Names",   icon:"★",  desc:"99 Names"},
    {id:"dua",    label:"Du\u02bca", icon:"🤲", desc:"Supplications"},
  ];

  const th     = useMemo(() => mkTheme(isDark), [isDark]);
  const hadith = useMemo(() => todaysHadith(), []);
  const dayNum = useMemo(() => getDayOfYear(), []);

  useEffect(() => {
    document.body.style.transition = "background 0.38s ease";
    document.body.style.background = isDark
      ? "linear-gradient(160deg,#111009,#0e0c09)"
      : "linear-gradient(160deg,#f5f1eb,#ede9e2)";
    document.body.className = th.scrollClass;
  }, [isDark]);

  useEffect(() => { save({name,counts,targets,totalSession,isDark}); }, [name,counts,targets,totalSession,isDark]);

  // Auto-reset daily at midnight
  useEffect(() => {
    const lastReset = localStorage.getItem("dhikr_last_reset");
    const today = new Date().toDateString();
    if (lastReset && lastReset !== today) {
      setCounts(DEFS.counts);
      setTotalSession(0);
      showToast("New day — counts reset. Bismillah! 🌙");
    }
    localStorage.setItem("dhikr_last_reset", today);
    // Schedule next reset at midnight
    const now = new Date();
    const msToMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1) - now;
    const t = setTimeout(() => {
      setCounts(DEFS.counts); setTotalSession(0);
      localStorage.setItem("dhikr_last_reset", new Date().toDateString());
      showToast("New day — counts reset. Bismillah! 🌙");
    }, msToMidnight);
    return () => clearTimeout(t);
  }, []);

  useEffect(() => {
    if (celebration) {
      const t = setTimeout(() => setCelebration(null), 2850);
      return () => clearTimeout(t);
    }
  }, [celebration]);

  const showToast = msg => {
    if (toastRef.current) clearTimeout(toastRef.current);
    setNotification(msg);
    toastRef.current = setTimeout(() => setNotification(null), 2800);
  };

  const tap = useCallback(id => {
    setCounts(prev => {
      const t = targets[id], nc = prev[id] + 1;
      if (nc % t === 0) {
        const d = DHIKR_LIST.find(x => x.id === id), cy = nc / t;
        setTimeout(() => {
          showToast(`${d.transliteration} — ${cy} cycle${cy > 1 ? "s" : ""} complete!`);
          setCelebration({ dhikr: d, cycleNum: cy });
        }, 0);
      }
      return {...prev, [id]: nc};
    });
    setTotalSession(n => {
      const next = n + 1;
      // Milestone toasts
      if ([100, 250, 500, 1000, 2000].includes(next)) {
        setTimeout(() => showToast(`${next} dhikr today! SubhanAllah 🌿`), 0);
      }
      // Update streak
      updateStreak(next);
      return next;
    });
  }, [targets]);

  const reset        = useCallback(id => setCounts(p => ({...p, [id]: 0})), []);
  const [confirmReset, setConfirmReset] = useState(false);
  const resetAll = () => {
    if (!confirmReset) { setConfirmReset(true); setTimeout(() => setConfirmReset(false), 3000); return; }
    setCounts(DEFS.counts); setTotalSession(0); setConfirmReset(false);
    showToast("Counts reset");
  };
  const updateTarget = useCallback((id, t) => { setTargets(p => ({...p, [id]: t})); }, []);
  const saveName     = () => { const n = nameInput.trim(); if (!n) return; setName(n[0].toUpperCase() + n.slice(1)); setEditingName(false); };

  useEffect(() => {
    const h = e => {
      if (e.key === "Escape") { setShowSettings(false); setEditingName(false); }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [showSettings, editingName]);

  const totalCycles = DHIKR_LIST.reduce((s, d) => s + Math.floor(counts[d.id] / targets[d.id]), 0);

  if (!name) return <NameSetup onDone={n => setName(n)} th={th} isMobile={isMobile}/>;

  /* ── Restore handler ── */
  const handleRestore = data => {
    if (data.name)    setName(data.name);
    if (data.counts)  setCounts({...DEFS.counts,...data.counts});
    if (data.targets) setTargets({...DEFS.targets,...data.targets});
    if (data.totalSession !== undefined) setTotalSession(data.totalSession);
    if (typeof data.isDark === "boolean") setIsDark(data.isDark);
    showToast("Progress restored! Alhamdulillah ✓");
  };

  /* ── Shared content ── */
  const TabContent = (
    <div style={{animation:"tabIn 0.26s cubic-bezier(0.22,1,0.36,1) both"}}>
      {activeTab==="home"   && <Dashboard th={th} isMobile={isMobile} isDark={isDark} name={name} counts={counts} targets={targets} totalSession={totalSession} G={G} onGoTasbih={()=>setActiveTab("tasbih")}/>}
      {activeTab==="prayer" && <PrayerTimesTab th={th} isMobile={isMobile}/>}
      {activeTab==="names"  && <NamesOfAllah th={th} isMobile={isMobile}/>}
      {activeTab==="dua"    && <DuaCollection th={th} isMobile={isMobile}/>}
    </div>
  );

  /* ── Modals + overlays ── */
  const Overlays = (
    <div>
      {activeTab==="tasbih" && <TasbihMode th={th} isDark={isDark} isMobile={isMobile} onClose={()=>setActiveTab("home")} counts={counts} targets={targets} onTap={tap} onReset={reset} onUndo={id=>setCounts(p=>({...p,[id]:Math.max(0,(p[id]||0)-1)}))} updateTarget={updateTarget}/>}
      {showSave&&<SaveCodeModal th={th} isMobile={isMobile} onClose={()=>setShowSave(false)} currentState={{name,counts,targets,totalSession,isDark}} onRestore={handleRestore}/>}
      {notification&&<div style={{position:"fixed",bottom:isMobile?80:28,left:"50%",transform:"translateX(-50%)",background:th.toastBg,color:th.toastText,padding:"11px 26px",borderRadius:100,fontSize:13,fontWeight:700,boxShadow:th.dark?"0 10px 44px rgba(0,0,0,0.55)":"0 10px 44px rgba(28,24,18,0.2)",whiteSpace:"nowrap",animation:"toastIn 0.32s cubic-bezier(0.22,1,0.36,1) both",zIndex:1000,letterSpacing:0.3}}>{notification}</div>}
      {celebration&&(
        <div className="celeb-overlay"
          style={{background:"radial-gradient(ellipse at center,"+celebration.dhikr.color+"e8 0%,"+celebration.dhikr.color+"b0 40%,"+celebration.dhikr.accent+"80 70%,"+celebration.dhikr.color+"55 100%)"}}
          onClick={()=>setCelebration(null)}>
          <svg className="celeb-svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
            <defs><radialGradient id="crg" cx="50%" cy="50%" r="50%"><stop offset="0%" stopColor={celebration.dhikr.light} stopOpacity="0.4"/><stop offset="100%" stopColor={celebration.dhikr.light} stopOpacity="0"/></radialGradient></defs>
            <ellipse cx="400" cy="300" rx="340" ry="260" fill="url(#crg)" style={{animation:"celebGlowPulse 1.6s ease-in-out infinite"}}/>
            <circle cx="400" cy="300" r="0" fill="none" stroke={celebration.dhikr.light} strokeWidth="2.5" style={{animation:"celebRingA 1.8s cubic-bezier(0.22,1,0.36,1) 0.05s forwards",opacity:0}}/>
            <circle cx="400" cy="300" r="0" fill="none" stroke={celebration.dhikr.mid}   strokeWidth="1.5" style={{animation:"celebRingB 2.0s cubic-bezier(0.22,1,0.36,1) 0.18s forwards",opacity:0}}/>
            <circle cx="400" cy="300" r="0" fill="none" stroke={celebration.dhikr.light} strokeWidth="1"   style={{animation:"celebRingC 2.2s cubic-bezier(0.22,1,0.36,1) 0.35s forwards",opacity:0}}/>
            {[0,45,90,135,180,225,270,315].map(a=>(
              <line key={a} x1="400" y1="300"
                x2={400+Math.cos(a*Math.PI/180)*380} y2={300+Math.sin(a*Math.PI/180)*380}
                stroke={celebration.dhikr.light} strokeWidth="0.6" opacity="0.12"/>
            ))}
          </svg>
          <div className="celeb-card">
            <div className="celeb-arabic">{celebration.dhikr.arabic}</div>
            <div className="celeb-divider"/>
            <div className="celeb-transliteration">{celebration.dhikr.transliteration}</div>
            <div className="celeb-translation">{celebration.dhikr.translation}</div>
            <div className="celeb-badge">
              <span className="celeb-label">✦ Cycle Complete</span>
              <span className="celeb-cycles">· {celebration.cycleNum} {celebration.cycleNum===1?"cycle":"cycles"}</span>
            </div>
          </div>
        </div>
      )}
    </div>
  );

  /* ══════════ MOBILE LAYOUT ══════════ */
  if (isMobile) return (
    <div style={{minHeight:"100vh",fontFamily:"'Inter',-apple-system,sans-serif",transition:"color 0.3s ease",paddingBottom:72}}>
      <div style={{maxWidth:540,margin:"0 auto",padding:"14px 14px 8px"}}>

        {/* Mobile header */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div>
            <div style={{fontSize:11,color:th.textMuted,fontWeight:500,marginBottom:1}}>
              Assalamu Alaikum,{" "}
              {editingName
                ? <span style={{display:"inline-flex",alignItems:"center",gap:5}}>
                    <input autoFocus value={nameInput} onChange={e=>setNameInput(e.target.value)}
                      onKeyDown={e=>{if(e.key==="Enter")saveName();if(e.key==="Escape")setEditingName(false);}}
                      style={{fontSize:11,fontWeight:700,color:th.text,border:"none",borderBottom:"2px solid "+G,background:"transparent",width:90,fontFamily:"inherit",padding:"0 2px"}}/>
                    <button onClick={saveName} style={{fontSize:11,color:G,fontWeight:700,border:"none",background:"none",cursor:"pointer",fontFamily:"inherit"}}>✓</button>
                  </span>
                : <span onClick={()=>{setNameInput(name);setEditingName(true);}} style={{color:G,fontWeight:700,cursor:"pointer"}}>{name} ✎</span>
              }
            </div>
            <div style={{fontSize:21,fontWeight:800,color:th.text,letterSpacing:-0.6,lineHeight:1.1}}>Daily Dhikr</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>setShowSave(true)} style={{width:38,height:38,borderRadius:12,border:"1.5px solid "+th.border,background:th.surface,color:th.textMuted,fontSize:17,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>☁️</button>
            <button onClick={()=>setShowSettings(s=>!s)} style={{width:38,height:38,borderRadius:12,border:"1.5px solid "+th.border,background:showSettings?th.text:th.surface,color:showSettings?(isDark?"#111":th.surface):th.textMuted,fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>⚙</button>
          </div>
        </div>

        {/* Mobile stats */}
        {activeTab==="home"&&<div style={{display:"flex",gap:8,marginBottom:12}}>
          {[{v:totalSession,l:"Session"},{v:totalCycles,l:"Cycles"}].map((s,i)=>(
            <div key={i} style={{flex:1,background:th.surface,borderRadius:12,border:"1.5px solid "+th.border,padding:"9px 12px",display:"flex",alignItems:"center",gap:9}}>
              <div style={{fontSize:21,fontWeight:900,color:th.text,lineHeight:1}}>{s.v}</div>
              <div style={{fontSize:9,color:th.textMuted,fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",lineHeight:1.3}}>{s.l}</div>
            </div>
          ))}
        </div>}

        {/* Settings panel */}
        {showSettings&&<div style={{background:th.surface,borderRadius:16,padding:"13px 15px",marginBottom:12,border:"1.5px solid "+th.border,animation:"slideDown 0.22s ease"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:11}}>
            <span style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:0.5,color:th.textMuted}}>Dark mode</span>
            <Toggle on={isDark} onChange={setIsDark} th={th}/>
          </div>
          <button onClick={resetAll} style={{width:"100%",padding:"10px",borderRadius:11,border:"1.5px solid "+(confirmReset?"#c8612a":th.resetBorder),background:confirmReset?"#c8612a":(th.resetBg),color:confirmReset?"white":th.resetText,fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s"}}>{confirmReset?"Tap again to confirm":"Reset All Counts"}</button>
        </div>}

        {TabContent}
      </div>

      {/* Bottom nav */}
      <nav className="bnav" style={{background:th.dark?"rgba(15,13,8,0.97)":"rgba(255,255,255,0.97)",borderTop:"1px solid "+th.border,backdropFilter:"blur(20px)",WebkitBackdropFilter:"blur(20px)",boxShadow:th.dark?"0 -1px 0 rgba(255,255,255,0.04)":"0 -4px 24px rgba(0,0,0,0.09)"}}>
        {TABS.map(tab=>{
          const a=activeTab===tab.id;
          return(
            <button key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{color:a?G:th.textFaint,position:"relative"}}>
              <span style={{fontSize:22,lineHeight:1,display:"block",filter:a?"none":"grayscale(0.15) opacity(0.55)"}}>{tab.icon}</span>
              <span style={{fontSize:9.5,fontWeight:a?800:600,letterSpacing:0.3}}>{tab.label}</span>
              {a&&<div style={{position:"absolute",bottom:3,left:"50%",transform:"translateX(-50%)",width:16,height:2.5,borderRadius:2,background:G}}/>}
            </button>
          );
        })}
      </nav>

      {Overlays}
    </div>
  );

  /* ══════════ DESKTOP LAYOUT ══════════ */
  return (
    <div className="dsk-shell" style={{fontFamily:"'Inter',-apple-system,sans-serif",transition:"color 0.3s ease",background:th.bg}}>

      {/* Sidebar */}
      <aside className="dsk-sidebar" style={{
        background:th.dark?"linear-gradient(180deg,#171310,#111009)":"linear-gradient(180deg,#fff,#f7f4ef)",
        borderRight:"1px solid "+th.border,
        boxShadow:th.dark?"1px 0 0 rgba(255,255,255,0.03)":"4px 0 28px rgba(0,0,0,0.07)",
      }}>
        {/* Logo */}
        <div style={{padding:"24px 20px 18px"}}>
          <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:4}}>
            <div style={{width:38,height:38,borderRadius:11,background:"linear-gradient(135deg,#1d5c3a,"+G+",#52b788)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,boxShadow:"0 4px 14px "+G+"40"}}>
              <span style={{fontFamily:"'Amiri',Georgia,serif",fontSize:21,color:"white",lineHeight:1}}>ذ</span>
            </div>
            <div>
              <div style={{fontSize:14,fontWeight:800,color:th.text,letterSpacing:-0.3,lineHeight:1.2}}>Dhikr Tracker</div>
              <div style={{fontSize:10,color:th.textFaint,fontStyle:"italic",fontFamily:"'Lora',serif",marginTop:1}}>Daily remembrance</div>
            </div>
          </div>
        </div>

        <div style={{height:1,background:th.border,margin:"0 14px 10px"}}/>

        {/* Nav */}
        <nav style={{padding:"0 10px",flex:1}}>
          {TABS.map(tab=>{
            const a=activeTab===tab.id;
            return(
              <button key={tab.id} onClick={()=>setActiveTab(tab.id)} className="dsk-nav-btn"
                style={{background:a?(th.dark?G+"20":G+"12"):"transparent",color:a?G:th.textMuted,marginBottom:2,borderLeft:a?"3px solid "+G:"3px solid transparent",paddingLeft:11}}>
                <div style={{width:30,height:30,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",background:a?(th.dark?G+"28":G+"14"):(th.dark?"rgba(255,255,255,0.05)":"rgba(0,0,0,0.04)"),flexShrink:0,fontSize:15}}>{tab.icon}</div>
                <div style={{minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:a?700:600,color:a?G:th.text,lineHeight:1.2}}>{tab.label}</div>
                  <div style={{fontSize:10,color:th.textFaint,marginTop:1}}>{tab.desc}</div>
                </div>
              </button>
            );
          })}
        </nav>

        {/* Bottom */}
        <div style={{padding:"12px 10px 22px",borderTop:"1px solid "+th.border}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:12}}>
            {[{v:totalSession,l:"Session"},{v:totalCycles,l:"Cycles"}].map((s,i)=>(
              <div key={i} style={{textAlign:"center",padding:"11px 6px",borderRadius:11,background:th.dark?"rgba(255,255,255,0.04)":"rgba(0,0,0,0.03)",border:"1px solid "+th.border}}>
                <div style={{fontSize:21,fontWeight:900,color:th.text,lineHeight:1,letterSpacing:-0.5}}>{s.v}</div>
                <div style={{fontSize:8.5,color:th.textFaint,fontWeight:700,letterSpacing:0.8,textTransform:"uppercase",marginTop:3}}>{s.l}</div>
              </div>
            ))}
          </div>
          <div style={{padding:"9px 11px",borderRadius:11,background:th.dark?"rgba(255,255,255,0.03)":"rgba(0,0,0,0.025)",border:"1px solid "+th.border,marginBottom:9}}>
            <div style={{fontSize:9,color:th.textFaint,marginBottom:3,letterSpacing:0.3,textTransform:"uppercase",fontWeight:700}}>Praying as</div>
            {editingName
              ? <div style={{display:"flex",alignItems:"center",gap:5}}>
                  <input autoFocus value={nameInput} onChange={e=>setNameInput(e.target.value)}
                    onKeyDown={e=>{if(e.key==="Enter")saveName();if(e.key==="Escape")setEditingName(false);}}
                    style={{fontSize:13,fontWeight:700,color:th.text,border:"none",borderBottom:"2px solid "+G,background:"transparent",width:"100%",fontFamily:"inherit",padding:"0 2px",outline:"none"}}/>
                  <button onClick={saveName} style={{fontSize:11,color:G,fontWeight:700,border:"none",background:"none",cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>✓</button>
                </div>
              : <div onClick={()=>{setNameInput(name);setEditingName(true);}} style={{fontSize:14,fontWeight:700,color:th.text,cursor:"pointer",display:"flex",alignItems:"center",gap:5}} title="Click to edit">
                  {name}<span style={{fontSize:10,color:th.textFaint,opacity:0.7}}>✎</span>
                </div>
            }
          </div>
          <button onClick={()=>setShowSave(true)} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 11px",borderRadius:11,border:"1.5px solid "+th.border,background:"transparent",color:th.textMuted,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",width:"100%",marginBottom:7,transition:"all 0.17s",textAlign:"left"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=G;e.currentTarget.style.color=G;e.currentTarget.style.background=th.dark?G+"10":G+"08";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor=th.border;e.currentTarget.style.color=th.textMuted;e.currentTarget.style.background="transparent";}}>
            <span style={{fontSize:14}}>☁️</span> Sync Progress
          </button>
          <div style={{display:"flex",gap:6}}>
            <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 11px",borderRadius:11,border:"1.5px solid "+th.border}}>
              <span style={{fontSize:11,fontWeight:600,color:th.textMuted}}>Dark</span>
              <Toggle on={isDark} onChange={setIsDark} th={th}/>
            </div>
            <button onClick={resetAll} style={{padding:"8px 12px",borderRadius:11,border:"1.5px solid "+(confirmReset?"#c8612a":th.resetBorder),background:confirmReset?"#c8612a":th.resetBg,color:confirmReset?"white":th.resetText,fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all 0.2s"}}>{confirmReset?"Sure?":"↺ Reset"}</button>
          </div>
        </div>
      </aside>

      {/* Main */}
      <main className="dsk-main" style={{padding:"38px 42px 68px",minHeight:"100vh",boxSizing:"border-box"}}>
        {/* Page header */}
        <div style={{marginBottom:28,paddingBottom:22,borderBottom:"1px solid "+th.border,display:"flex",alignItems:"flex-end",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:11,color:th.textMuted,fontWeight:600,letterSpacing:1.5,textTransform:"uppercase",marginBottom:5}}>
              {new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}
            </div>
            <div style={{fontSize:30,fontWeight:900,color:th.text,letterSpacing:-0.8,lineHeight:1}}>
              {activeTab==="home" ? "Dashboard" : activeTab==="tasbih" ? "Tasbih" : activeTab==="prayer" ? "Prayer Times" : activeTab==="names" ? "99 Names" : "Du\u02bca Collection"}
            </div>
          </div>
          {activeTab==="home"&&<div style={{display:"flex",alignItems:"center",gap:18,flexShrink:0}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:26,fontWeight:900,color:th.text,lineHeight:1,letterSpacing:-0.8}}>{totalSession}</div>
              <div style={{fontSize:9,color:th.textMuted,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginTop:3}}>Session</div>
            </div>
            <div style={{width:1,height:32,background:th.border}}/>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:26,fontWeight:900,color:th.text,lineHeight:1,letterSpacing:-0.8}}>{totalCycles}</div>
              <div style={{fontSize:9,color:th.textMuted,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginTop:3}}>Cycles</div>
            </div>
          </div>}
        </div>
        {TabContent}
      </main>

      {Overlays}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

<script>
// Service worker disabled - not needed for file:// or simple hosting
</script>
</body>
</html>
